name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: rustup target add armv7-unknown-linux-musleabihf
      - run: sh scripts/build-armv7.sh
      - name: Prepare assets
        run: |
          mkdir -p dist
          cp target/armv7-unknown-linux-musleabihf/release/venus-tpms-ble dist/venus-tpms-ble-armv7-musl
          cd dist
          sha256sum venus-tpms-ble-armv7-musl > venus-tpms-ble-armv7-musl.sha256
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
